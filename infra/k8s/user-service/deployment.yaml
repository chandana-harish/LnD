apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-deployment 
  namespace: ld
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: user
    spec:
      containers:
        - name: user-cont
          image: chandu554/user_lb_image:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: user-config
            - secretRef:
                name: user-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"