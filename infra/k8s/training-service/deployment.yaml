apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-deployment 
  namespace: ld
spec:
  replicas: 2
  selector:
    matchLabels:
      app: training
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: training
    spec:
      containers:
        - name: training-cont
          image: chandu554/training-ld-service:latest
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: training-config
            - secretRef:
                name: training-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"