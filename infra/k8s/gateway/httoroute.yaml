apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ld-route
  namespace: ld
spec:
  parentRefs:
    - name: ld-gateway

  rules:

    # 🔹 AUTH SERVICE
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: auth-svc
          port: 3001

    # 🔹 USER SERVICE
    - matches:
        - path:
            type: PathPrefix
            value: /users
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: user-svc
          port: 3002

    # 🔹 TRAINING SERVICE
    - matches:
        - path:
            type: PathPrefix
            value: /trainings
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: training-svc
          port: 3003

    # 🔹 ATTENDANCE SERVICE
    - matches:
        - path:
            type: PathPrefix
            value: /attendance
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: attendance-svc
          port: 3004

    # 🔹 FRONTEND
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-svc
          port: 80