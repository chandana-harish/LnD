apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ld-route
  namespace: ld
spec:
  parentRefs:
    - name: ld-gateway

  rules:

    # 🔹 AUTH SERVICE
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      backendRefs:
        - name: auth-svc
          port: 3001

    # 🔹 USER SERVICE
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user-svc
          port: 3002

    # 🔹 TRAINING SERVICE
    - matches:
        - path:
            type: PathPrefix
            value: /api/training
      backendRefs:
        - name: training-svc
          port: 3003

    # 🔹 ATTENDANCE SERVICE
    - matches:
        - path:
            type: PathPrefix
            value: /api/attendance
      backendRefs:
        - name: attendance-svc
          port: 3004

    # 🔹 FRONTEND (KEEP THIS LAST)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-svc
          port: 80