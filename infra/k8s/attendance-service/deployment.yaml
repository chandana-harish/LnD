apiVersion: apps/v1
kind: Deployment
metadata:
  name: attendance-deployment 
  namespace: ld
spec:
  replicas: 2
  selector:
    matchLabels:
      app: attendance
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: attendance
    spec:
      containers:
        - name: attendance-cont
          image: chandu554/attendance-service-lb:latest
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: attendance-config
            - secretRef:
                name: attendance-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"